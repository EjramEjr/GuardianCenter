<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guardian Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #00d4ff; --primary-dark: #0099cc; --secondary: #ff4757; --accent: #ffa502; --success: #2ed573; --darker: #070a0f; --card: #161b22; --border: #21262d; --text: #e6edf3; --text-muted: #8b949e; --glass: rgba(15,20,25,0.92); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--darker); color: var(--text); overflow-x: hidden; }
        
        .bg-animation { position: fixed; inset: 0; z-index: -1; background: radial-gradient(ellipse at 15% 50%, rgba(0,212,255,0.05) 0%, transparent 50%), radial-gradient(ellipse at 85% 20%, rgba(255,71,87,0.04) 0%, transparent 50%); }
        .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .box-container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .input-group input, .input-group select { width: 100%; padding: 16px; border-radius: 14px; background: var(--darker); border: 1px solid var(--border); color: white; margin-bottom: 15px; outline: none; font-size: 15px; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,212,255,0.2); }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,212,255,0.3); }
        .btn-danger { background: linear-gradient(135deg, var(--secondary), #cc0000); box-shadow: 0 8px 20px rgba(255,71,87,0.3); }
        
        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -300px; top: 0; width: 280px; height: 100vh; background: var(--glass); border-left: 1px solid var(--border); z-index: 1000; transition: 0.3s; padding: 20px; backdrop-filter: blur(20px); }
        .sidebar.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; color: var(--text-muted); text-decoration: none; cursor: pointer; transition: 0.3s; font-weight: 700; margin-bottom: 5px; border: 1px solid transparent; }
        .nav-link:hover, .nav-link.active { background: rgba(0,212,255,0.1); color: var(--primary); border-color: rgba(0,212,255,0.2); }
        
        .main-content { padding: 20px; max-width: 800px; margin: auto; transition: 0.3s; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(15,20,25,0.8); padding: 15px 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; backdrop-filter: blur(10px); }
        .header-bar button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; }
        .card-icon { width: 60px; height: 60px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 15px; background: rgba(0,212,255,0.1); color: var(--primary); }
        .card-value { font-size: 32px; font-weight: 900; margin-top: 15px; }

        .notification { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150%); background: var(--primary); color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; transition: 0.4s; z-index: 99999; box-shadow: 0 5px 20px rgba(0,212,255,0.4); }
        .notification.show { transform: translate(-50%, 0); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="notification" id="notification">رسالة</div>

    <div class="full-screen" id="authScreen">
        <div class="box-container">
            <i class="fas fa-shield-halved" style="font-size: 60px; color: var(--primary); margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,212,255,0.5));"></i>
            <h2 style="margin-bottom: 25px;">Guardian Center</h2>
            <div class="input-group"><input type="email" id="logEmail" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="logPass" placeholder="كلمة المرور"></div>
            <button class="btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
        </div>
    </div>

    <div id="appContainer" class="hidden">
        <div class="sidebar" id="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border);">
                <h3 style="color: var(--primary);"><i class="fas fa-shield-halved"></i> القائمة</h3>
                <button onclick="document.getElementById('sidebar').classList.remove('open')" style="background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div id="navLinks"></div>
            <button class="btn-primary btn-danger" style="margin-top: 30px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </div>

        <div class="main-content">
            <div class="header-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button onclick="document.getElementById('sidebar').classList.add('open')"><i class="fas fa-bars"></i></button>
                    <h2 id="pageTitle" style="font-size: 18px; font-weight: 800;">مركز الألعاب</h2>
                </div>
                <div id="parentHeaderControls" class="hidden" style="display: flex; align-items: center; gap: 10px; background: var(--darker); padding: 5px 15px; border-radius: 12px; border: 1px solid var(--border);">
                    <i class="fas fa-child" style="color: var(--primary);"></i>
                    <select id="childSelector" style="background:transparent; border:none; color:white; outline:none; font-family:inherit;">
                        <option value="">اختر الطفل...</option>
                    </select>
                </div>
                <div id="childHeaderBadge" class="hidden" style="background: rgba(0,212,255,0.1); color: var(--primary); padding: 5px 15px; border-radius: 12px; font-size: 13px; font-weight: 800; border: 1px solid rgba(0,212,255,0.2);">Gamer VIP</div>
            </div>

            <div id="gameBoosterPage">
                <div style="background: linear-gradient(135deg, rgba(15,20,25,0.9), rgba(0,212,255,0.05)); border: 2px solid var(--primary); border-radius: 24px; padding: 35px 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,212,255,0.15);">
                    <i class="fas fa-bolt" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
                    <h2>وضع الأداء الفائق</h2>
                    <p style="color: var(--text-muted); font-size: 14px; margin: 10px 0 20px;">حظر التطبيقات المتطفلة وتوجيه الموارد للألعاب</p>
                    <button class="btn-primary" style="width: auto; padding: 12px 30px; border-radius: 30px;" onclick="requestPermissions()"><i class="fas fa-check-circle"></i> إعطاء الصلاحيات الفائقة</button>
                </div>

                <div class="cards-grid">
                    <div class="card" style="border-color: var(--success);">
                        <i class="fas fa-memory" style="font-size: 40px; color: var(--success); margin-bottom: 15px;"></i>
                        <h3 style="font-size: 16px;">الرامات (مستخدم)</h3>
                        <div class="card-value" id="realRamTxt" style="color: var(--success);">--%</div>
                    </div>
                    <div class="card">
                        <i class="fas fa-microchip" style="font-size: 40px; color: var(--secondary); margin-bottom: 15px;"></i>
                        <h3 style="font-size: 16px;">المعالج (CPU)</h3>
                        <div class="card-value" style="font-size: 24px;">محسّن <i class="fas fa-check-circle" style="color:var(--success); font-size:18px;"></i></div>
                    </div>
                </div>

                <div class="card" style="margin-bottom: 20px; padding: 30px;">
                    <h3 style="margin-bottom: 10px;">تنظيف الذاكرة الفعلي</h3>
                    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">إغلاق كافة التطبيقات المتطفلة من جذورها إجبارياً</p>
                    <button class="btn-primary btn-danger" id="cleanBtn" onclick="triggerRealClean()"><i class="fas fa-broom"></i> تنظيف الآن</button>
                </div>

                <div class="card">
                    <h3 style="text-align: right; margin-bottom: 15px;"><i class="fas fa-gamepad"></i> ألعابي</h3>
                    <div style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;">
                        <div style="min-width: 80px; padding: 15px; background: var(--darker); border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer;"><i class="fas fa-crosshairs" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i><div style="font-size: 12px; font-weight: bold;">PUBG</div></div>
                        <div style="min-width: 80px; padding: 15px; background: var(--darker); border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer;"><i class="fas fa-fire" style="font-size: 30px; color: var(--secondary); margin-bottom: 10px;"></i><div style="font-size: 12px; font-weight: bold;">FreeFire</div></div>
                        <div style="min-width: 80px; padding: 15px; background: var(--darker); border-radius: 15px; border: 1px dashed var(--text-muted); text-align: center; cursor: pointer;" onclick="showNotif('سيتم فتح قائمة التطبيقات')"><i class="fas fa-plus" style="font-size: 30px; color: var(--text-muted); margin-bottom: 10px;"></i><div style="font-size: 12px; color: var(--text-muted);">إضافة</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyALz6MYVTOCxrtW3kG_hC_48kWYHlF4kO4", projectId: "ejram-6b3b5", appId: "1:28357002125:web:bdd7d3418e8ec2b2c533c4" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();

        function showNotif(msg) { const el = document.getElementById('notification'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value).catch(() => showNotif('خطأ في البيانات')); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                
                db.collection('users').doc(user.uid).get().then(doc => {
                    const role = doc.exists ? doc.data().role : 'normal';
                    
                    if(role === 'parent' || role === 'admin') {
                        document.getElementById('parentHeaderControls').classList.remove('hidden');
                        document.getElementById('childHeaderBadge').classList.add('hidden');
                        document.getElementById('navLinks').innerHTML = '<a class="nav-link"><i class="fas fa-users-cog"></i> إدارة الحسابات</a><a class="nav-link"><i class="fas fa-eye"></i> حالة الأطفال</a><a class="nav-link active" onclick="document.getElementById(\\'sidebar\\').classList.remove(\\'open\\')"><i class="fas fa-gamepad"></i> مركز الألعاب (تجربة)</a>';
                    } else {
                        document.getElementById('parentHeaderControls').classList.add('hidden');
                        document.getElementById('childHeaderBadge').classList.remove('hidden');
                        document.getElementById('navLinks').innerHTML = '<a class="nav-link active" onclick="document.getElementById(\\'sidebar\\').classList.remove(\\'open\\')"><i class="fas fa-gamepad"></i> مركز الألعاب</a><a class="nav-link" onclick="document.getElementById(\\'sidebar\\').classList.remove(\\'open\\')"><i class="fas fa-broom"></i> منظف الذاكرة</a>';
                    }
                });

                startRealStatsMonitor();
            } else {
                document.getElementById('appContainer').classList.add('hidden');
                document.getElementById('authScreen').classList.remove('hidden');
            }
        });

        // دوال المحرك الحقيقي (Java)
        async function startRealStatsMonitor() {
            if(!window.Capacitor || !Capacitor.Plugins.GuardianEngine) return;
            setInterval(async () => {
                try {
                    const stats = await Capacitor.Plugins.GuardianEngine.getRealStats();
                    document.getElementById('realRamTxt').textContent = stats.ramUsagePercent + '%';
                } catch(e) {}
            }, 2000);
        }

        async function triggerRealClean() {
            if(!window.Capacitor || !Capacitor.Plugins.GuardianEngine) return showNotif('تعمل الميزة في التطبيق الأصلي فقط');
            const btn = document.getElementById('cleanBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري القتل...';
            
            try {
                const res = await Capacitor.Plugins.GuardianEngine.executeRealClean();
                showNotif(`تم تحرير الذاكرة وقتل ${res.killedApps} تطبيق!`);
            } catch(e) {
                showNotif('حدث خطأ أثناء التنظيف');
            }
            btn.innerHTML = '<i class="fas fa-broom"></i> تنظيف الآن';
        }

        async function requestPermissions() {
            if(!window.Capacitor || !Capacitor.Plugins.GuardianEngine) return;
            await Capacitor.Plugins.GuardianEngine.requestDeepPermissions();
            showNotif('يرجى إعطاء الصلاحيات المطلوبة لتفعيل الوضع الفائق');
        }
    </script>
</body>
</html>
