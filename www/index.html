<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Guardian Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #070a0f; color: #fff; font-family: 'Tajawal'; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .user-row { background: #21262d; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div id="adminSection" class="hidden">
            <div class="card">
                <h2>أجهزة الأطفال المتصلة</h2>
                <div id="deviceList">جاري جلب البيانات...</div>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyALz6MYVTOCxrtW3kG_hC_48kWYHlF4kO4", authDomain: "ejram-6b3b5.firebaseapp.com", projectId: "ejram-6b3b5", storageBucket: "ejram-6b3b5.appspot.com", messagingSenderId: "28357002125", appId: "1:28357002125:web:bdd7d3418e8ec2b2c533c4" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('adminSection').classList.remove('hidden');
                loadDevices();
            }
        });

        // دي الدالة اللي بتملى اللوحة بالبيانات الحقيقية
        function loadDevices() {
            const list = document.getElementById('deviceList');
            db.collection("users").where("role", "==", "child").onSnapshot(snap => {
                list.innerHTML = ""; // مسح القديم
                if(snap.empty) list.innerHTML = "لا يوجد أجهزة أطفال متصلة حالياً";
                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="user-row">
                            <span>${data.email || 'جهاز طفل'}</span>
                            <span style="color:#00d4ff;">متصل</span>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
