<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guardian Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #00d4ff; --secondary: #ff4757; --dark: #0f1419; --darker: #070a0f; --card: #161b22; --text: #e6edf3; --border: #21262d; --success: #2ed573; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--darker); color: var(--text); overflow-x: hidden; }
        
        /* شاشة التحميل الاحترافية */
        #splashLoader { position: fixed; inset: 0; background: var(--darker); z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(0,212,255,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* الشاشات العامة */
        .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .box-container { background: rgba(15,20,25,0.9); border: 1px solid var(--border); border-radius: 28px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; border-radius: 12px; background: var(--darker); border: 1px solid var(--border); color: white; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #0099cc); }
        .btn-danger { background: linear-gradient(135deg, var(--secondary), #cc0000); }
        
        .app-container { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        
        /* قائمة الألعاب */
        .games-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .game-item { background: var(--darker); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; }
        .game-icon { font-size: 30px; color: var(--primary); margin-bottom: 10px; }
        
        .notification { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150%); background: var(--primary); color: white; padding: 15px 30px; border-radius: 30px; transition: 0.4s; z-index: 99999; }
        .notification.show { transform: translate(-50%, 0); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="splashLoader">
        <i class="fas fa-shield-halved" style="font-size: 60px; color: var(--primary);"></i>
        <h2 style="margin-top: 15px;">Guardian Engine</h2>
        <div class="spinner"></div>
    </div>

    <div class="notification" id="notification">رسالة</div>

    <div class="full-screen hidden" id="authScreen">
        <div class="box-container">
            <i class="fas fa-shield-halved" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>تسجيل الدخول</h2>
            <div class="input-group" style="margin-top:20px;"><input type="email" id="logEmail" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="logPass" placeholder="كلمة المرور"></div>
            <button class="btn btn-primary" onclick="login()">دخول</button>
        </div>
    </div>

    <div class="app-container" id="appContainer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="userEmailTxt">User</h2>
            <button class="btn btn-danger" style="width: auto; padding: 8px 15px; margin: 0;" onclick="logout()">خروج</button>
        </div>

        <div class="card" style="border-color: var(--primary);">
            <i class="fas fa-bolt" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
            <h3>وضع الأداء الفائق</h3>
            <p style="color: var(--text-muted); font-size: 13px; margin: 10px 0;">توجيه كافة موارد الهاتف للألعاب</p>
            <button class="btn btn-primary" onclick="requestPermissionsAndOverlay()">إعطاء الصلاحيات وفتح النافذة العائمة</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div class="card">
                <i class="fas fa-memory" style="font-size: 30px; color: var(--success); margin-bottom: 10px;"></i>
                <h4>الرامات (مستخدم)</h4>
                <div id="realRamTxt" style="font-size: 24px; font-weight: bold; margin-top: 5px;">--%</div>
            </div>
            <div class="card">
                <i class="fas fa-microchip" style="font-size: 30px; color: var(--secondary); margin-bottom: 10px;"></i>
                <h4>المعالج (CPU)</h4>
                <div style="font-size: 24px; font-weight: bold; margin-top: 5px;">محسّن</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px;">تنظيف الذاكرة الفعلي</h3>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 15px;">إغلاق كافة التطبيقات المتطفلة إجبارياً</p>
            <button class="btn btn-danger" onclick="triggerRealClean()" id="cleanBtn"><i class="fas fa-broom"></i> تنظيف الآن</button>
        </div>

        <div class="card">
            <h3 style="text-align: right;"><i class="fas fa-gamepad"></i> ألعابي</h3>
            <div class="games-grid">
                <div class="game-item" onclick="launchGame('PUBG')"><i class="fas fa-crosshairs game-icon"></i><div style="font-size: 12px; font-weight: bold;">PUBG</div></div>
                <div class="game-item" onclick="launchGame('FreeFire')"><i class="fas fa-fire game-icon" style="color: var(--secondary);"></i><div style="font-size: 12px; font-weight: bold;">FreeFire</div></div>
                <div class="game-item" onclick="launchGame('Roblox')"><i class="fas fa-cube game-icon" style="color: var(--success);"></i><div style="font-size: 12px; font-weight: bold;">Roblox</div></div>
                <div class="game-item" style="border-style: dashed;" onclick="showNotif('سيتم فتح قائمة الهاتف لإضافة لعبة')"><i class="fas fa-plus game-icon" style="color: var(--text-muted);"></i><div style="font-size: 12px; color: var(--text-muted);">إضافة</div></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyALz6MYVTOCxrtW3kG_hC_48kWYHlF4kO4", projectId: "ejram-6b3b5", appId: "1:28357002125:web:bdd7d3418e8ec2b2c533c4" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showNotif(msg) {
            const el = document.getElementById('notification');
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value).catch(e => showNotif('خطأ في البيانات'));
        }
        function logout() { auth.signOut(); }

        // التحقق من الحساب (يخفي شاشة التحميل فقط بعد التأكد)
        auth.onAuthStateChanged(user => {
            document.getElementById('splashLoader').style.opacity = '0';
            setTimeout(() => document.getElementById('splashLoader').style.display = 'none', 500);

            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('userEmailTxt').textContent = user.email;
                startRealStatsMonitor(); // بدء قراءة رامات الجهاز الحقيقية
            } else {
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('authScreen').classList.remove('hidden');
            }
        });

        // ================= الأوامر الأصلية للجافا =================
        async function startRealStatsMonitor() {
            if(!window.Capacitor || !Capacitor.Plugins.GuardianEngine) return;
            setInterval(async () => {
                try {
                    const stats = await Capacitor.Plugins.GuardianEngine.getRealStats();
                    document.getElementById('realRamTxt').textContent = stats.ramUsagePercent + '%';
                } catch(e) {}
            }, 2000);
        }

        async function triggerRealClean() {
            if(!window.Capacitor || !Capacitor.Plugins.GuardianEngine) return showNotif('هذه الميزة تعمل فقط داخل التطبيق الأصلي');
            const btn = document.getElementById('cleanBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري القتل...';
            
            try {
                const res = await Capacitor.Plugins.GuardianEngine.executeRealClean();
                showNotif(`تم قتل ${res.killedApps} تطبيق من الخلفية!`);
                btn.innerHTML = '<i class="fas fa-broom"></i> تنظيف الآن';
            } catch(e) {
                btn.innerHTML = '<i class="fas fa-broom"></i> تنظيف الآن';
            }
        }

        async function requestPermissionsAndOverlay() {
            if(!window.Capacitor) return;
            // 1. طلب الأذونات العميقة (النافذة والوصول)
            await Capacitor.Plugins.GuardianEngine.requestDeepPermissions();
            // 2. إظهار النافذة العائمة
            await Capacitor.Plugins.GuardianNative.showGameOverlay();
            showNotif('تم تفعيل النافذة العائمة والأذونات');
        }

        async function launchGame(name) {
            if(window.Capacitor) Capacitor.Plugins.GuardianNative.showGameOverlay();
            showNotif('جاري تشغيل ' + name + ' وتحسين الموارد...');
        }
    </script>
</body>
</html>
