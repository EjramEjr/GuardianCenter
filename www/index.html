<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #0984e3; --dark: #2d3436; --light: #f5f6fa; --card: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--light); color: var(--dark); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        .icon { font-size: 60px; color: var(--primary); margin-bottom: 20px; }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 12px; text-decoration: none; transition: background 0.2s; }
        .btn:active { background: #076bba; }
        .btn-secondary { background: var(--dark); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-user-shield"></i></div>
        <h1>نظام الرقابة الأبوية Guardian</h1>
        <p>مرحباً بك في تطبيق الرعاية العائلية المفتوح. يتطلب هذا التطبيق تفعيل صلاحيات النظام الرسمية لتمكين الوالدين من متابعة وقت استخدام الشاشة وإدارة التطبيقات بشكل آمن وشفاف.</p>
        
        <button class="btn" onclick="triggerAdmin()">1. تفعيل صلاحية مدير الجهاز</button>
        <button class="btn btn-secondary" onclick="triggerUsage()">2. منح صلاحية مراقبة الاستخدام</button>
    </div>

    <script>
        async function triggerAdmin() {
            if (window.Capacitor && window.Capacitor.isPluginAvailable('GuardianEngine')) {
                try {
                    await Capacitor.Plugins.GuardianEngine.openDeviceAdminSettings();
                } catch (e) { alert("خطأ: " + e); }
            } else { alert("ميزة إدارة الجهاز متاحة فقط عند تشغيل التطبيق على بيئة الأندرويد."); }
        }

        async function triggerUsage() {
            if (window.Capacitor && window.Capacitor.isPluginAvailable('GuardianEngine')) {
                try {
                    await Capacitor.Plugins.GuardianEngine.openUsageStatsSettings();
                } catch (e) { alert("خطأ: " + e); }
            } else { alert("ميزة مراقبة الاستخدام متاحة فقط عند تشغيل التطبيق على بيئة الأندرويد."); }
        }
    </script>
</body>
</html>
